# MILLIE Pi — native RF sensor node (NOT an ESP reader)
# Pi scans WiFi/BLE/monitor on its own radios and PUSHES to the phone dashboard.

node:
  id: "millie-pi"
  label: "Home RF node"

phone:
  url: "http://192.168.1.213:8770"
  push_seconds: 2

# Pi reads RF itself — do NOT plug ESP32 into Pi for this mode.
esp:
  enabled: false

rf:
  wifi_iface: "wlan0"
  wifi_scan: true
  wifi_interval: 15
  ble_scan: true
  ble_interval: 20
  # USB Alfa / monitor dongle — set after: sudo airmon-ng start wlan1
  monitor_iface: ""
  monitor_scan: false
  monitor_interval: 10
  dedupe_seconds: 8

# No Pi dashboard — phone is the only UI.
hub:
  enabled: false
  data_dir: "~/.millie-pi"
