# MILLIE Pi — native RF sensor node (NOT an ESP reader)
# Pi scans WiFi/BLE/monitor on its own radios and PUSHES to the phone dashboard.

node:
  id: "millie-pi"
  label: "Home RF node"

phone:
  url: "http://192.168.1.213:8770"
  push_seconds: 2

esp:
  enabled: false

rf:
  wifi_iface: "auto"          # auto-detect wlan0 / wlan1
  wifi_scan: true
  wifi_interval: 5
  ble_scan: true
  ble_interval: 10
  scan_loop_seconds: 8        # background scan thread interval
  use_sudo: true                # requires setup.sh sudoers (passwordless iw/wpa_cli)
  monitor_iface: ""
  monitor_scan: false
  monitor_interval: 10
  dedupe_seconds: 6

hub:
  enabled: false
  data_dir: "~/.millie-pi"
